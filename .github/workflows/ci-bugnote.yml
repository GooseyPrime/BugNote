name: CI (BugNote)

on:
  push:
    paths: ["apps/**", "packages/**", "scripts/**", ".github/workflows/**"]
  pull_request:
    paths: ["apps/**", "packages/**", "scripts/**", ".github/workflows/**"]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
